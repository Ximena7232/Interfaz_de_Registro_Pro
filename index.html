<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro Pro</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background: linear-gradient(135deg,#00b4b4,#007b7b);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      color:white;
    }

    header{
      background: rgba(0,0,0,0.15);
      text-align:center;
      padding:25px;
    }

    header h1{
      font-size:2rem;
      margin-bottom:10px;
    }

    main{
      flex:1;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:500px;
      background:white;
      color:#333;
      border-radius:20px;
      padding:30px;
      box-shadow:0 10px 25px rgba(0,0,0,0.3);
    }

    .perfil{
      display:flex;
      justify-content:center;
      margin-bottom:20px;
    }

    .perfil img{
      width:120px;
      height:120px;
      border-radius:50%;
      object-fit:contain;
      background:#fff;
      padding:5px;
      border:4px solid #00b4b4;
    }

    form{
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    label{
      font-weight:bold;
      margin-bottom:5px;
      display:block;
    }

    input{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid #ccc;
      font-size:1rem;
    }

    input:focus{
      outline:none;
      border-color:#00b4b4;
      box-shadow:0 0 5px rgba(0,180,180,0.5);
    }

    button{
      background:#00b4b4;
      color:white;
      border:none;
      padding:12px;
      border-radius:10px;
      font-size:1rem;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#008c8c;
    }

    .usuarios{
      margin-top:25px;
    }

    .usuarios h2{
      text-align:center;
      margin-bottom:15px;
      color:#007b7b;
    }

    .usuario-card{
      background:#f2f2f2;
      padding:15px;
      border-radius:12px;
      margin-bottom:15px;
      border-left:5px solid #00b4b4;
    }

    .usuario-card p{
      margin:6px 0;
    }

    .btn-eliminar{
      margin-top:10px;
      background:#e53935;
      padding:10px;
      width:100%;
      border:none;
      border-radius:10px;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    .btn-eliminar:hover{
      background:#c62828;
    }

    footer{
      text-align:center;
      padding:15px;
      background: rgba(0,0,0,0.15);
      font-size:0.9rem;
    }

    @media(max-width:480px){

      header h1{
        font-size:1.5rem;
      }

      .container{
        padding:20px;
      }

    }

  </style>
</head>

<body>

  <header>
    <h1>Registro de Usuario Pro</h1>
    
  </header>

  <main>

    <section class="container">

      <!-- FOTO -->
      <div class="perfil">
       <img src="https://media.istockphoto.com/id/2062236773/vector/person-photo-placeholder-woman-default-avatar-profile-icon-grey-photo-placeholder-female-no.jpg?s=612x612&w=0&k=20&c=SO7xGRTejVsPD7pIXqilJwj4YRO7gmYS4fQbYWBOu0Y=" alt="perfil">
      </div>

      <!-- FORMULARIO -->
      <form id="registroForm">

        <div>
          <label for="nombre">Nombre Completo</label>

          <input
            type="text"
            id="nombre"
            placeholder="Ingresa tu nombre"
            required>
        </div>

        <div>
          <label for="email">Correo Electrónico</label>

          <input
            type="email"
            id="email"
            placeholder="ejemplo@email.com"
            required>
        </div>

        <div>
          <label for="password">Contraseña</label>

          <input
            type="password"
            id="password"
            placeholder="Mínimo 8 caracteres"
            minlength="8"
            required>
        </div>

        <!-- FECHA -->
        <div>
          <label for="fechaNacimiento">
            Fecha de Nacimiento
          </label>

          <input
            type="date"
            id="fechaNacimiento"
            required>
        </div>

        <!-- PAÍS -->
        <div>
          <label for="pais">País</label>

          <input
            list="paises"
            id="pais"
            placeholder="Selecciona tu país"
            required>

          <datalist id="paises">
            <option value="México">
            <option value="Argentina">
            <option value="Colombia">
            <option value="Chile">
            <option value="Perú">
            <option value="España">
            <option value="Estados Unidos">
          </datalist>

        </div>

        <!-- COLOR -->
        <div>
          <label for="color">Color Favorito</label>

          <input
            type="color"
            id="color"
            value="#00b4b4">
        </div>

        <button type="submit">
          Registrarse
        </button>

      </form>

      <!-- USUARIOS -->
      <div class="usuarios">

        <h2>Usuarios Registrados</h2>

        <div id="listaUsuarios"></div>

      </div>

    </section>

  </main>

  <footer>
    <p>© 2026 Registro Pro | HTML + CSS + JavaScript</p>
  </footer>

  <script>

    const formulario =
    document.getElementById("registroForm");

    const listaUsuarios =
    document.getElementById("listaUsuarios");

    let usuarios =
    JSON.parse(localStorage.getItem("usuarios")) || [];

    mostrarUsuarios();

    // REGISTRAR USUARIO
    formulario.addEventListener("submit", function(e){

      e.preventDefault();

      const usuario = {

        nombre:
        document.getElementById("nombre").value,

        email:
        document.getElementById("email").value,

        password:
        document.getElementById("password").value,

        fechaNacimiento:
        document.getElementById("fechaNacimiento").value,

        pais:
        document.getElementById("pais").value,

        color:
        document.getElementById("color").value

      };

      usuarios.push(usuario);

      localStorage.setItem(
        "usuarios",
        JSON.stringify(usuarios)
      );

      mostrarUsuarios();

      formulario.reset();

      document.getElementById("color").value =
      "#00b4b4";

      alert("Usuario registrado correctamente");

    });

    // MOSTRAR USUARIOS
    function mostrarUsuarios(){

      listaUsuarios.innerHTML = "";

      usuarios.forEach((usuario, index) => {

        listaUsuarios.innerHTML += `

          <div class="usuario-card">

            <p>
              <strong>Nombre:</strong>
              ${usuario.nombre}
            </p>

            <p>
              <strong>Email:</strong>
              ${usuario.email}
            </p>

            <p>
              <strong>Fecha de Nacimiento:</strong>
              ${usuario.fechaNacimiento}
            </p>

            <p>
              <strong>País:</strong>
              ${usuario.pais}
            </p>

            <p>
              <strong>Color Favorito:</strong>

              <span style="
                display:inline-block;
                width:25px;
                height:25px;
                border-radius:50%;
                background:${usuario.color};
                border:2px solid #000;
                vertical-align:middle;
                margin-left:10px;
              ">
              </span>

              ${usuario.color}

            </p>

            <button
              class="btn-eliminar"
              onclick="eliminarUsuario(${index})">

              Eliminar Registro

            </button>

          </div>

        `;

      });

    }

    // ELIMINAR USUARIO
    function eliminarUsuario(index){

      const confirmar =
      confirm("¿Deseas eliminar este registro?");

      if(confirmar){

        usuarios.splice(index, 1);

        localStorage.setItem(
          "usuarios",
          JSON.stringify(usuarios)
        );

        mostrarUsuarios();

      }

    }

  </script>

</body>
</html>
